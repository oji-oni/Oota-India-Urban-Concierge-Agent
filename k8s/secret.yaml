# ─────────────────────────────────────────────────────────────────────────────
# k8s/secret.yaml
# Kubernetes Secret for Oota Agent sensitive credentials.
#
# ⚠️  DO NOT commit real values to version control.
#     Replace each REPLACE_WITH_BASE64_ENCODED_* placeholder with the
#     base64-encoded value of your secret BEFORE applying.
#
# Encode a value:
#   echo -n 'your-value' | base64
#
# Apply:
#   kubectl apply -f k8s/secret.yaml
#
# Alternatively, create the secret imperatively (safer — avoids storing
# secrets in YAML files):
#   kubectl create secret generic oota-secrets \
#     --from-literal=GOOGLE_API_KEY=your_key \
#     --from-literal=TELEGRAM_BOT_TOKEN=your_token \
#     --from-literal=ENCRYPTION_KEY=your_fernet_key
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: oota-secrets
  labels:
    app: oota-agent
type: Opaque
data:
  # Google Gemini API key (from Google AI Studio or Vertex AI)
  # echo -n 'your-value' | base64
  GOOGLE_API_KEY: REPLACE_WITH_BASE64_ENCODED_KEY

  # Telegram Bot token from @BotFather
  # echo -n 'your-value' | base64
  TELEGRAM_BOT_TOKEN: REPLACE_WITH_BASE64_ENCODED_TOKEN

  # 32-byte Fernet key for at-rest encryption
  # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  # echo -n 'your-value' | base64
  ENCRYPTION_KEY: REPLACE_WITH_BASE64_ENCODED_KEY
