apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oota-data-pvc
  labels:
    app: oota-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oota-skills-pvc
  labels:
    app: oota-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
